name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux AMD64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-amd64
          # Linux ARM64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            name: linux-arm64
          # macOS AMD64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: macos-amd64
          # macOS ARM64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macos-arm64
          # Windows AMD64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-amd64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2
      with:
        key: ${{ matrix.target }}

    - name: Install cross-compilation tools (ARM64 Linux)
      if: matrix.target == 'aarch64-unknown-linux-gnu'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu

    - name: Build release binary
      run: cargo build --release --target ${{ matrix.target }}

    - name: Rename binary with architecture suffix
      shell: bash
      run: |
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          mv target/${{ matrix.target }}/release/chiatru.exe chiatru-${{ matrix.name }}.exe
        else
          mv target/${{ matrix.target }}/release/chiatru chiatru-${{ matrix.name }}
        fi

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: chiatru-${{ matrix.name }}
        path: |
          chiatru-${{ matrix.name }}*
        retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download all build artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create release archives
      shell: bash
      run: |
        cd artifacts
        for dir in */; do
          if [[ $dir == *"windows"* ]]; then
            zip -r "${dir%/}.zip" "$dir"
          else
            tar -czf "${dir%/}.tar.gz" "$dir"
          fi
        done

    - name: Create GitHub release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/*.tar.gz,artifacts/*.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}